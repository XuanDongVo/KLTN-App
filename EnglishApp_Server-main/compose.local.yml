services:
  mongo:
    image: mongo:8.0
    container_name: englishapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - englishapp-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  englishapp-mongo-data:
